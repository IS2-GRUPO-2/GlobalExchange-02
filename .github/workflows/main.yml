name: Run Backend Tests

on:
  push:
    branches: ["**"]   # todas las ramas
  pull_request:
    branches: ["**"]   # todos los PRs

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: globalexchange_development
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-django

      - name: Run migrations
        env:
          POSTGRES_NAME: globalexchange_development
          POSTGRES_USER: postgres
          POSTGRES_PASS: admin
          POSTGRES_HOST: db
          POSTGRES_PORT: 5432
        run: |
          cd backend
          python manage.py migrate --noinput

      - name: Run tests
        env:
          POSTGRES_NAME: globalexchange_development
          POSTGRES_USER: postgres
          POSTGRES_PASS: admin
          POSTGRES_HOST: db
          POSTGRES_PORT: 5432
        run: |
          cd backend
          pytest -v
